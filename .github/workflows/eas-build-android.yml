name: EAS Build - Android (SGI mobile)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/sgi-mobile
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS Build (Android)
        run: eas build --platform android --profile ${{ github.event.inputs.profile }} --non-interactive --no-wait

      - name: Build queued
        run: |
          echo "Build queued su EAS. Segui il progresso e scarica l'AAB da:"
          echo "https://expo.dev/accounts/trantads-work/projects/sgi-mobile/builds"
